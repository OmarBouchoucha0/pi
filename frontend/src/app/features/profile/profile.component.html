<div class="h-full w-full bg-white flex flex-col overflow-hidden">
  <!-- Header -->
  <div class="px-6 py-4 border-b border-black/10 flex-shrink-0">
    <h1 class="text-sm font-semibold text-[#0a0a0a]">Profile Settings</h1>
    <p class="text-xs text-black/40 mt-0.5">Manage your account information</p>
  </div>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto min-h-0">
    <div class="max-w-2xl mx-auto py-6 px-6 flex flex-col gap-6">
      <!-- Section: Personal Info -->
      <div class="flex flex-col gap-1">
        <span class="text-[10px] font-semibold text-black/30 uppercase tracking-wider px-1"
          >Personal Info</span
        >
        <div class="border border-black/10 rounded-xl overflow-hidden">
          <div class="flex items-center justify-between gap-4 px-4 py-3 border-b border-black/5">
            <div class="flex flex-col gap-0.5 w-28 flex-shrink-0">
              <span class="text-xs font-medium text-[#0a0a0a]">First Name</span>
            </div>
            <input
              type="text"
              [(ngModel)]="firstName"
              name="firstName"
              class="flex-1 text-xs text-[#0a0a0a] text-right bg-transparent border-none outline-none placeholder:text-black/30 focus:outline-none"
            />
          </div>

          <div class="flex items-center justify-between gap-4 px-4 py-3 border-b border-black/5">
            <div class="flex flex-col gap-0.5 w-28 flex-shrink-0">
              <span class="text-xs font-medium text-[#0a0a0a]">Last Name</span>
            </div>
            <input
              type="text"
              [(ngModel)]="lastName"
              name="lastName"
              class="flex-1 text-xs text-[#0a0a0a] text-right bg-transparent border-none outline-none placeholder:text-black/30 focus:outline-none"
            />
          </div>

          <div class="flex items-center justify-between gap-4 px-4 py-3 border-b border-black/5">
            <div class="flex flex-col gap-0.5 w-28 flex-shrink-0">
              <span class="text-xs font-medium text-[#0a0a0a]">Email</span>
            </div>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              readonly
              class="flex-1 text-xs text-[#0a0a0a] text-right bg-transparent border-none outline-none placeholder:text-black/30 focus:outline-none opacity-60"
            />
          </div>

          <div class="flex items-center justify-between gap-4 px-4 py-3">
            <div class="flex flex-col gap-0.5 w-28 flex-shrink-0">
              <span class="text-xs font-medium text-[#0a0a0a]">Phone</span>
            </div>
            <input
              type="text"
              [(ngModel)]="phone"
              name="phone"
              class="flex-1 text-xs text-[#0a0a0a] text-right bg-transparent border-none outline-none placeholder:text-black/30 focus:outline-none"
            />
          </div>
        </div>
      </div>

      <!-- Save Button -->
      <div class="flex justify-end pb-2">
        <button
          (click)="saveChanges()"
          [disabled]="saving"
          class="text-xs font-medium text-white bg-[#0a0a0a] rounded-lg px-4 py-2 hover:opacity-80 transition-opacity disabled:opacity-50"
        >
          {{ saving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<p-toast />
