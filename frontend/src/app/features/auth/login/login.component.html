<div
  class="min-h-screen min-w-screen flex items-center justify-center backdrop-blur-md bg-[#f5f5f5]"
>
  <div
    appTilt
    class="w-[400px] bg-white rounded-[4px] border-2 border-[#0a0a0a] px-10 py-12 will-change-transform"
  >
    <h2 class="text-[36px] font-bold tracking-tight leading-tight text-[#0a0a0a] mb-2">
      Welcome back
    </h2>
    <p class="text-sm font-light text-black/40 mb-8">Sign in to your account to continue</p>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <!-- Email -->
      <div class="flex flex-col gap-1.5">
        <p-floatlabel variant="on" class="w-full">
          <input
            pInputText
            [(ngModel)]="email"
            name="email"
            inputId="email"
            class="!w-full !rounded-xs !p-1 !border !border-black/15 !bg-white !text-m !font-light !text-[#0a0a0a] !shadow-none !transition-all focus:!border-[#0a0a0a] focus:!shadow-none focus:!outline-none"
          />
          <label for="email" class="!text-xs !font-light">Email</label>
        </p-floatlabel>
        @if (emailInvalid && submitted) {
          <small class="text-red-500 text-[11px] font-light pl-1">Please enter a valid email</small>
        }
      </div>

      <!-- Password -->
      <div class="flex flex-col gap-1.5">
        <p-floatlabel variant="on" class="w-full">
          <p-password
            [(ngModel)]="password"
            name="password"
            inputId="password"
            autocomplete="off"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="!w-full !p-1 !rounded-xs !border !border-black/15 !bg-white !text-m !font-light !text-[#0a0a0a] !shadow-none !transition-all focus:!border-[#0a0a0a] focus:!shadow-none focus:!outline-none"
          />
          <label for="password" class="!text-xs !font-light">Password</label>
        </p-floatlabel>
        @if (passwordInvalid && submitted) {
          <small class="text-red-500 text-[11px] font-light pl-1"
            >Password must be at least 6 characters</small
          >
        }
      </div>

      <div class="flex justify-end -mt-1">
        <span class="text-xs text-black/40 cursor-pointer hover:text-black/70 transition-colors">
          Forgot password?
        </span>
      </div>

      <p-button
        label="Sign In"
        type="submit"
        styleClass="!w-full !rounded-lg !bg-[#0a0a0a] !border-2 !border-[#0a0a0a] !text-white !text-sm !font-semibold !py-[13px] !shadow-none !transition-all !duration-300 hover:!opacity-80 !mt-1"
      />

      <p class="text-center text-xs font-light text-black/40">
        Don't have an account?
        <span
          class="text-[#0a0a0a] font-medium border-b border-[#0a0a0a] cursor-pointer hover:opacity-70 transition-opacity"
          tabindex="0"
          role="button"
          (click)="router.navigate(['/signup'])"
          (keyup.enter)="router.navigate(['/signup'])"
        >
          Register
        </span>
      </p>
    </form>
  </div>
</div>
