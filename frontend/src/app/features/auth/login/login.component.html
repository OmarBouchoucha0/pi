<div
  class="min-h-screen min-w-screen flex items-center justify-center backdrop-blur-md bg-[#f5f5f5]"
>
  <div
    appTilt
    class="w-[400px] bg-white rounded-lg border-2 border-[#0a0a0a] px-10 py-12 will-change-transform"
  >
    <h2 class="text-[36px] font-bold tracking-tight leading-tight text-[#0a0a0a]">Welcome back</h2>
    <p class="text-sm font-light text-black/40 mb-8">Sign in to your account to continue</p>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
      <!-- Email -->
      <div class="flex flex-col">
        <p-floatlabel variant="on" class="w-full">
          <input
            pInputText
            [(ngModel)]="email"
            name="email"
            inputId="email"
            class="!w-full !rounded-xs !p-1 !border !border-black/15 !bg-white !text-m !font-light !text-[#0a0a0a] !shadow-none !transition-all focus:!border-[#0a0a0a] focus:!shadow-none focus:!outline-none"
          />
          <label for="email" class="!text-xs !font-light">Email</label>
        </p-floatlabel>
        @if (emailInvalid && submitted) {
          <small class="text-red-500 text-[12px] font-light pl-1">Please enter a valid email</small>
        }
      </div>

      <!-- Password -->
      <div class="flex flex-col">
        <p-floatlabel variant="on" class="w-full">
          <p-password
            [(ngModel)]="password"
            name="password"
            inputId="password"
            autocomplete="off"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="!w-full !p-1 !rounded-xs !border !border-black/15 !bg-white !text-m !font-light !text-[#0a0a0a] !shadow-none !transition-all focus:!border-[#0a0a0a] focus:!shadow-none focus:!outline-none"
          />
          <label for="password" class="!text-xs !font-light">Password</label>
        </p-floatlabel>
        @if (passwordInvalid && submitted) {
          <small class="text-red-500 text-[12px] font-light pl-1"
            >Password must be at least 6 characters</small
          >
        }
      </div>

      <!-- Forgot password -->
      <div class="flex justify-end -mt-2 mb-0">
        <span
          class="text-xs text-black/40 cursor-pointer hover:text-black/70 transition-colors leading-none"
        >
          Forgot password?
        </span>
      </div>

      <!-- Sign In -->
      <p-button
        label="Sign In"
        type="submit"
        styleClass="!w-full !rounded-lg !bg-black !border !border-black/15 !text-[#ffffff] !text-sm !font-medium !py-[9px] !shadow-none !transition-all !duration-300 hover:!opacity-85"
      />

      <!-- Divider -->
      <div class="flex items-center gap-3 -my-2">
        <div class="flex-1 h-px bg-black/10"></div>
        <span class="text-[11px] text-black/30 font-light">or</span>
        <div class="flex-1 h-px bg-black/10"></div>
      </div>

      <!-- Google -->
      <p-button
        type="button"
        styleClass="!w-full !rounded-lg !bg-white !border !border-black/15 !text-[#0a0a0a] !text-sm !font-medium !py-[9px] !shadow-none !transition-all !duration-300 hover:!bg-black/5"
      >
        <ng-template pTemplate="content">
          <div class="flex items-center justify-center gap-3 w-full">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-4 h-4 shrink-0">
              <path
                fill="#EA4335"
                d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85l6.1-6.1C34.46 3.09 29.5 1 24 1 14.82 1 7.01 6.48 3.44 14.22l7.19 5.58C12.4 13.36 17.73 9.5 24 9.5z"
              />
              <path
                fill="#4285F4"
                d="M46.52 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.7c-.55 2.96-2.2 5.47-4.68 7.16l7.19 5.58C43.36 37.97 46.52 31.67 46.52 24.5z"
              />
              <path
                fill="#FBBC05"
                d="M10.63 28.2A14.6 14.6 0 0 1 9.5 24c0-1.46.2-2.88.56-4.2L2.87 14.2A23.94 23.94 0 0 0 .5 24c0 3.87.92 7.53 2.54 10.77l7.59-6.57z"
              />
              <path
                fill="#34A853"
                d="M24 47c5.5 0 10.12-1.82 13.5-4.93l-7.19-5.58C28.6 37.98 26.42 38.5 24 38.5c-6.27 0-11.6-3.86-13.37-9.3l-7.59 6.57C7.01 41.52 14.82 47 24 47z"
              />
            </svg>
            <span>Continue with Google</span>
          </div>
        </ng-template>
      </p-button>

      <!-- Register -->
      <p class="text-center text-xs font-light text-black/40 mt-1">
        Don't have an account?
        <span
          class="text-[#0a0a0a] rounded-xs font-medium border-b border-[#0a0a0a] cursor-pointer hover:opacity-70 transition-opacity"
          tabindex="0"
          role="button"
          (click)="router.navigate(['/signup'])"
          (keyup.enter)="router.navigate(['/signup'])"
        >
          Register
        </span>
      </p>
    </form>
  </div>
</div>
