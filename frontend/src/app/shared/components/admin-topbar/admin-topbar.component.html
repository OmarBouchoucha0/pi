<div class="w-full bg-white border-b border-black/30 px-4 py-3 grid grid-cols-3 items-center">
  <!-- Left: Page Title -->
  <div></div>
  <!-- Middle: Search -->
  <div class="relative flex justify-center items-center w-full max-w-sm">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="absolute left-3 w-3.5 h-3.5 text-[#0a0a0a]/40 pointer-events-none"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 15.803a7.5 7.5 0 0 0 10.607 0Z"
      />
    </svg>
    <input
      type="text"
      placeholder="Search..."
      class="w-full h-8 pl-8 pr-16 text-xs text-[#0a0a0a] placeholder:text-[#0a0a0a]/40 bg-white border border-black/30 rounded-lg outline-none focus:border-black/80 transition-colors"
    />
    <div class="absolute right-2 flex items-center gap-0.5 pointer-events-none">
      <kbd class="text-[10px] text-[#0a0a0a]/40 bg-black/5 rounded px-1 py-0.5 font-sans">ctrl</kbd>
      <kbd class="text-[10px] text-[#0a0a0a]/40 bg-black/5 rounded px-1 py-0.5 font-sans">k</kbd>
    </div>
  </div>
  <!-- Right: Actions + Avatar -->
  <div class="flex items-center justify-end gap-1">
    <!-- Notifications -->
    <button
      (click)="notificationsOpen = true"
      pTooltip="Notifications"
      tooltipPosition="bottom"
      [showDelay]="1000"
      class="relative flex items-center justify-center w-8 h-8 rounded-lg hover:bg-[#0a0a0a] transition-colors cursor-pointer group"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 text-[#0a0a0a] group-hover:text-white transition-colors relative z-10"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
        />
      </svg>
      <span
        class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 rounded-full -translate-y-1/2 translate-x-1/2 z-0"
      ></span>
    </button>

    <div class="w-px h-8 bg-black/30 mx-1"></div>

    <!-- Avatar -->
    <div class="flex items-center gap-2.5">
      <p-avatar
        label="A"
        shape="circle"
        [style]="{
          width: '28px',
          height: '28px',
          'background-color': '#0a0a0a',
          color: 'white',
          'font-size': '11px',
          'font-weight': '600',
        }"
      />
      <div class="flex flex-col leading-none gap-0.5">
        <span class="text-xs font-medium text-[#0a0a0a]">Admin</span>
        <span class="text-xs font-medium text-[#0a0a0a]/60">Administrator</span>
      </div>
    </div>
  </div>
</div>

<!-- Notifications Drawer -->
<p-drawer
  [(visible)]="notificationsOpen"
  position="right"
  [modal]="true"
  [style]="{ width: '320px' }"
  styleClass="!border-l !border-black/30 !shadow-none !rounded-none"
>
  <ng-template #header>
    <span class="text-sm font-semibold text-[#0a0a0a]">Notifications</span>
  </ng-template>

  <div class="flex flex-col divide-y divide-black/5">
    <div class="flex flex-col items-center justify-center py-12 text-center">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-12 h-12 text-black/20 mb-3"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
        />
      </svg>
      <span class="text-xs text-black/40">No new notifications</span>
    </div>
  </div>
</p-drawer>
