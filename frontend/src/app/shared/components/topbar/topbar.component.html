<div class="w-full bg-white border-b border-black/30 px-4 py-3 grid grid-cols-3 items-center">
  <!-- Left: PlaceHolder -->
  <div></div>
  <!-- Middle: Search -->
  <div class="relative flex justify-center items-center w-full max-w-sm">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="absolute left-3 w-3.5 h-3.5 text-[#0a0a0a]/40 pointer-events-none"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 15.803a7.5 7.5 0 0 0 10.607 0Z"
      />
    </svg>
    <input
      type="text"
      placeholder="Search..."
      class="w-full h-8 pl-8 pr-16 text-xs text-[#0a0a0a] placeholder:text-[#0a0a0a]/40 bg-white border border-black/30 rounded-lg outline-none focus:border-black/80 transition-colors"
    />
    <div class="absolute right-2 flex items-center gap-0.5 pointer-events-none">
      <kbd class="text-[10px] text-[#0a0a0a]/40 bg-black/5 rounded px-1 py-0.5 font-sans">ctrl</kbd>
      <kbd class="text-[10px] text-[#0a0a0a]/40 bg-black/5 rounded px-1 py-0.5 font-sans">k</kbd>
    </div>
  </div>
  <!-- Right: Actions + Avatar -->
  <div class="flex items-center justify-end gap-1">
    <!-- Notifications -->
    <button
      pTooltip="Notifications"
      tooltipPosition="bottom"
      [showDelay]="1000"
      class="relative flex items-center justify-center w-8 h-8 rounded-lg hover:bg-[#0a0a0a] transition-colors cursor-pointer group"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 text-[#0a0a0a] group-hover:text-white transition-colors relative z-10"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
        />
      </svg>
      <span
        class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 rounded-full -translate-y-1/2 translate-x-1/2 z-0"
      ></span>
    </button>

    <!-- Settings -->
    <button
      pTooltip="Settings"
      tooltipPosition="bottom"
      [showDelay]="1000"
      class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-[#0a0a0a] transition-colors cursor-pointer group"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 text-[#0a0a0a] group-hover:text-white transition-colors"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
        />
      </svg>
    </button>

    <div class="w-px h-8 bg-black/30 mx-1"></div>

    <!-- Avatar -->
    <div class="flex items-center gap-2.5 cursor-pointer group">
      <p-avatar
        label="OB"
        shape="circle"
        [style]="{
          width: '28px',
          height: '28px',
          'background-color': '#0a0a0a',
          color: 'white',
          'font-size': '11px',
          'font-weight': '600',
        }"
        class="group-hover:opacity-80 transition-opacity"
      />
      <div class="flex flex-col leading-none gap-0.5">
        <span class="text-xs font-medium text-[#0a0a0a] group-hover:opacity-80 transition-opacity"
          >Omar</span
        >
        <span class="text-xs font-medium text-[#0a0a0a] group-hover:opacity-80 transition-opacity"
          >Bouchoucha</span
        >
      </div>
    </div>
  </div>
</div>
