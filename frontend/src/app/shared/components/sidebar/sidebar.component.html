<aside
  class="h-full flex flex-col bg-white border-r border-black/30 transition-[width] duration-300 ease-[cubic-bezier(0.25,0.46,0.45,0.94)] overflow-hidden"
  [ngClass]="collapsed ? 'w-16' : 'w-52'"
>
  <!-- Header -->
  <div class="flex items-center justify-between min-h-[64px] px-4 py-4">
    @if (!collapsed) {
      <div class="flex items-center gap-2">
        <div
          class="w-7 h-8 bg-[#0a0a0a] rounded-[4px] flex items-center justify-center transition-colors duration-100 group-hover:!bg-white group-hover:!text-[#0a0a0a]"
        >
          <span class="text-white text-xs font-bold">H</span>
        </div>
        <span
          class="text-sm font-semibold text-[#0a0a0a] tracking-tight whitespace-nowrap animate-fade"
          >Pi</span
        >
      </div>
    }
    <button
      (click)="toggle()"
      class="flex items-center justify-center w-7 h-7 rounded-lg hover:bg-[#0a0a0a] hover:text-white transition-all duration-100 cursor-pointer text-[#0a0a0a]"
      [ngClass]="{ 'mx-auto': collapsed }"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4 transition-transform duration-300"
        [ngClass]="{ 'rotate-180': collapsed }"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
      </svg>
    </button>
  </div>

  <!-- Menu Items -->
  <nav class="flex-1 flex flex-col gap-0 px-3 py-4">
    @for (item of menuItems; track item.icon) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-[#0a0a0a] text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center w-full h-10 rounded-lg transition-all duration-100 cursor-pointer text-left text-[#0a0a0a] bg-white hover:bg-[#0a0a0a] hover:text-white group px-3 gap-3"
        [pTooltip]="collapsed ? item.label : undefined"
        tooltipPosition="right"
        [showDelay]="500"
      >
        <span class="shrink-0 flex items-center justify-center w-[18px] h-[18px]">
          <!-- Dashboard -->
          @if (item.icon === 'home') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-[18px] h-[18px] text-[#0a0a0a] group-hover:text-white shrink-0 transition-colors duration-100"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"
              />
            </svg>
          }
          <!-- AI Chat Bot -->
          @if (item.icon === 'robot') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-[18px] h-[18px]"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8.625 9.75a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 0 1 .778-.332 48.294 48.294 0 0 0 5.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z"
              />
            </svg>
          }
          <!-- Appointments -->
          @if (item.icon === 'calendar') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-[18px] h-[18px] text-[#0a0a0a] group-hover:text-white shrink-0 transition-colors duration-100"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"
              />
            </svg>
          }
          <!-- Analytics -->
          @if (item.icon === 'chart') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-[18px] h-[18px] text-[#0a0a0a] group-hover:text-white shrink-0 transition-colors duration-100"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"
              />
            </svg>
          }
          <!-- Messages -->
          @if (item.icon === 'inbox') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-[18px] h-[18px] text-[#0a0a0a] group-hover:text-white shrink-0 transition-colors duration-100"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.012 1.244l.256.512a2.25 2.25 0 0 0 2.013 1.244h3.218a2.25 2.25 0 0 0 2.013-1.244l.256-.512a2.25 2.25 0 0 1 2.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 0 0-2.15-1.588H6.911a2.25 2.25 0 0 0-2.15 1.588L2.35 13.177a2.25 2.25 0 0 0-.1.661Z"
              />
            </svg>
          }
          <!-- Settings -->
          @if (item.icon === 'settings') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-[18px] h-[18px] text-[#0a0a0a] group-hover:text-white shrink-0 transition-colors duration-100"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
              />
            </svg>
          }
        </span>

        <span
          class="text-sm font-medium text-[#0a0a0a] group-hover:text-white transition-all duration-200 ease-in-out overflow-hidden whitespace-nowrap"
          [ngClass]="collapsed ? 'opacity-0 max-w-0' : 'opacity-100 max-w-[200px]'"
          >{{ item.label }}</span
        >
      </a>
    }
  </nav>

  <!-- Logout -->
  <div class="border-t border-black/30 px-3 py-2">
    <a
      routerLink="/login"
      class="flex items-center gap-3 w-full px-3 h-10 rounded-lg transition-all duration-100 cursor-pointer text-left text-[#0a0a0a] bg-white hover:bg-[#0a0a0a] hover:text-white group"
      [pTooltip]="collapsed ? 'Logout' : undefined"
      tooltipPosition="right"
      [showDelay]="500"
    >
      <span class="shrink-0 flex items-center justify-center w-[18px] h-[18px]">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-[18px] h-[18px] text-[#0a0a0a] group-hover:text-white shrink-0 transition-colors duration-100"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"
          />
        </svg>
      </span>
      <span
        class="text-sm font-medium text-[#0a0a0a] group-hover:text-white transition-all duration-300 ease-in-out overflow-hidden whitespace-nowrap"
        [ngClass]="collapsed ? 'opacity-0 max-w-0' : 'opacity-100 max-w-[200px]'"
        >Logout</span
      >
    </a>
  </div>
</aside>
