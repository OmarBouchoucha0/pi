<div class="flex-1 flex items-center justify-center">
  <div
    appTilt
    class="w-[400px] bg-white rounded-lg border-2 border-[#0a0a0a] px-10 py-12 will-change-transform"
  >
    <div class="flex flex-col items-center text-center gap-4">
      <!-- 404 -->
      <h1 class="text-[120px] font-bold tracking-tighter leading-none text-[#0a0a0a] select-none">
        404
      </h1>

      <!-- Message -->
      <div class="flex flex-col gap-1.5 -mt-2">
        <h2 class="text-lg font-semibold text-[#0a0a0a] tracking-tight">Page not found</h2>
        <p class="text-sm font-light text-black/40 max-w-[260px]">
          The page you're looking for doesn't exist or has been moved.
        </p>
      </div>

      <!-- Divider -->
      <div class="w-8 h-px bg-black/15 my-1"></div>

      <!-- Back button -->
      <p-button
        label="Go back home"
        type="button"
        (onClick)="router.navigate(['/login'])"
        styleClass="!rounded-lg !bg-[#0a0a0a] !border-2 !border-[#0a0a0a] !text-white !text-sm !font-semibold !px-6 !py-[10px] !shadow-none !transition-all !duration-300 hover:!opacity-80"
      />
    </div>
  </div>
</div>
